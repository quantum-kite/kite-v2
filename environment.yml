name: kite
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python >=3.9,<3.13
  - cxx-compiler
  - c-compiler
  - llvm-openmp
  - cmake >=3.9
  - make
  - hdf5=*=nompi*
  - fftw
  - numpy
  - scipy
  - h5py
  - matplotlib
  - pytest
# After activating this environment, install the kite package itself with:
#   pip install -e .
# (not done inline here as a `pip:` section, since that resolves "." relative
# to wherever environment.yml happens to be at solve time -- inside a staged
# Docker build, that's before the rest of the repo has been copied in, which
# breaks the whole point of copying environment.yml separately for caching.)
