# CI: build the docs site, and build+smoke-test KITE itself across OSes.
name: ci
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
        with:
          python-version: 3.x
      - run: pip install mkdocs-material
      - run: mkdocs gh-deploy --force

  # Windows is not in this matrix: a native (non-Docker) MSVC build needs real
  # portability work (M_PI, and/or/not word-operators, an OpenMP signed-index
  # requirement, an Eigen::Map overload gap -- see maintenance/installability-plan.md's
  # "Windows native build dropped" addendum for the full investigation) that's
  # been deliberately deprioritized in favor of Docker, which already runs
  # unmodified on Windows via Docker Desktop's WSL2 backend.
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v2

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: kite
          miniforge-version: latest

      - name: Debug — list conda env's fftw/hdf5 install
        shell: bash -el {0}
        run: |
          echo "CONDA_PREFIX=$CONDA_PREFIX"
          ls "$CONDA_PREFIX/lib" | grep -i "fftw\|hdf5" || echo "(no matching libs found)"

      - name: Install kite (editable)
        shell: bash -el {0}
        run: pip install -e .

      - name: Configure (CMake)
        shell: bash -el {0}
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_PREFIX_PATH=$CONDA_PREFIX -DCMAKE_BUILD_TYPE=Release ..

      - name: Build KITEx + KITE-tools
        shell: bash -el {0}
        run: cmake --build build --config Release -j 4

      - name: Smoke test — generate a config and run KITEx
        shell: bash -el {0}
        run: |
          cd examples
          python dos_graphene.py
          ../build/KITEx graphene_lattice-output.h5

      # NOTE: tests/start_tests.sh is not run here yet. Most of its cases need
      # the optional `pybinding` extra to regenerate configs, and at least one
      # case (tests/test001_KITEx_sq) fails independently of this workflow --
      # its checked-in configORIG.h5 fixture predates a C++ change that now
      # requires /Seed0 and /Seed1 fields. See maintenance/installability-plan.md
      # for details; fixing the test suite itself is separate, follow-up work.

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Build Docker image (includes its own baked-in smoke test)
        run: docker build -t quantum-kite/kite-v2:ci .

  # Follows docs/installation.md section 2.2's Homebrew recipe verbatim (as
  # verbatim as a non-interactive CI shell allows), on a real macOS runner
  # that ships with Homebrew preinstalled -- an actual end-to-end check of
  # that documented path, not just the conda one already covered above.
  build-and-test-homebrew:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v2

      - name: Install an up-to-date C++ compiler via Homebrew
        run: |
          brew install gcc
          GCC_VERSION=$(brew list --versions gcc | awk '{print $2}' | cut -d. -f1)
          echo "GCC_VERSION=$GCC_VERSION" >> "$GITHUB_ENV"

      - name: Install HDF5 from source, enforcing C++17 (matches docs section 2.2)
        run: |
          HOMEBREW_CC=gcc-$GCC_VERSION HOMEBREW_CXX=g++-$GCC_VERSION HOMEBREW_CXXFLAGS="-std=c++17" brew install hdf5 --build-from-source

      - name: Install CMake, Python, and FFTW3
        run: brew install python cmake git fftw

      - name: Install kite (editable) with the Homebrew python
        run: |
          # Modern Homebrew Python is "externally managed" (PEP 668) -- a bare
          # `pip install` is refused to protect Homebrew's own Python-dependent
          # formulae. A venv is the standard, recommended way around this (not
          # a workaround specific to CI): --break-system-packages would also
          # "fix" this but risks corrupting the Homebrew-managed interpreter.
          "$(brew --prefix)/bin/python3" -m venv .venv
          echo "PYTHON_BIN=$(pwd)/.venv/bin/python3" >> "$GITHUB_ENV"
          "$(pwd)/.venv/bin/python3" -m pip install -e .

      - name: Configure (CMake), passing the Homebrew compiler explicitly
        run: |
          mkdir -p build
          cd build
          cmake -DCMAKE_C_COMPILER=gcc-$GCC_VERSION -DCMAKE_CXX_COMPILER=g++-$GCC_VERSION -DCMAKE_BUILD_TYPE=Release ..

      - name: Build KITEx + KITE-tools
        run: cmake --build build --config Release -j 4

      - name: Smoke test — generate a config and run KITEx
        run: |
          cd examples
          "$PYTHON_BIN" dos_graphene.py
          ../build/KITEx graphene_lattice-output.h5
